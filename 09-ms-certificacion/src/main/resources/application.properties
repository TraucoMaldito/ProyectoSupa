spring.application.name=ms-certificacion

server.port=8088

spring.main.web-application-type=servlet

spring.datasource.url=jdbc:mysql://localhost:3306/db_certificacion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=MiSuperClaveSecretaParaTodosLosMicroserviciosDeLaTienda2024

despacho.url=http://localhost:8087

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=127.0.0.1
eureka.instance.instance-id=127.0.0.1:${spring.application.name}:${server.port}
