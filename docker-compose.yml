services:

  # ============================================================
  # BASE DE DATOS
  # ============================================================
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # EUREKA SERVER  (arranca primero)
  # ============================================================
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      mysql:
        condition: service_healthy

  # ============================================================
  # MICROSERVICIOS
  # ============================================================
  ms-autenticacion:
    build: ./01-ms-autenticacion
    container_name: ms-autenticacion
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_auth?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=ms-autenticacion
      - EUREKA_INSTANCE_PREFERIPADDRESS=false
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-catalogo:
    build: ./02-ms-catalogo
    container_name: ms-catalogo
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_catalogo?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=ms-catalogo
      - EUREKA_INSTANCE_PREFERIPADDRESS=false
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-sucursales:
    build: ./03-ms-sucursales
    container_name: ms-sucursales
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_sucursales?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=ms-sucursales
      - EUREKA_INSTANCE_PREFERIPADDRESS=false
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-carrito:
    build: ./04-ms-carrito
    container_name: ms-carrito
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_carrito?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=ms-carrito
      - EUREKA_INSTANCE_PREFERIPADDRESS=false
      - CATALOGO_URL=http://ms-catalogo:8081
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-registro-venta:
    build: ./05-ms-registro-venta
    container_name: ms-registro-venta
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_ventas?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=ms-registro-venta
      - EUREKA_INSTANCE_PREFERIPADDRESS=false
      - CARRITO_URL=http://ms-carrito:8082
      - CATALOGO_URL=http://ms-catalogo:8081
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-resena:
    build: ./06-ms-resena
    container_name: ms-resena
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_resenas?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=ms-resena
      - EUREKA_INSTANCE_PREFERIPADDRESS=false
      - VENTA_URL=http://ms-registro-venta:8083
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-envio:
    build: ./07-ms-envio
    container_name: ms-envio
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_envio?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=ms-envio
      - EUREKA_INSTANCE_PREFERIPADDRESS=false
      - VENTA_URL=http://ms-registro-venta:8083
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-despacho:
    build: ./08-ms-despacho
    container_name: ms-despacho
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_despacho?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=ms-despacho
      - EUREKA_INSTANCE_PREFERIPADDRESS=false
      - VENTA_URL=http://ms-registro-venta:8083
      - SUCURSAL_URL=http://ms-sucursales:8086
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-certificacion:
    build: ./09-ms-certificacion
    container_name: ms-certificacion
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_certificacion?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=ms-certificacion
      - EUREKA_INSTANCE_PREFERIPADDRESS=false
      - DESPACHO_URL=http://ms-despacho:8087
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # ============================================================
  # API GATEWAY  (arranca último)
  # ============================================================
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8090:8090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=api-gateway
      - EUREKA_INSTANCE_PREFERIPADDRESS=false
    depends_on:
      - eureka-server
